<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #img {
            width: 100%;
            height: 700px;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .btn-1 {
            position: absolute;
            top: 80%;
            font-size: 30px;
            padding: 10px;
        }

        .btn-2 {
            position: absolute;
            top: 80%;
            right: 0;
            font-size: 30px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div id="img">
        <button class="btn-1" onclick="left()"><i class="fa-solid fa-angle-left"></i></button>
        <button class="btn-2" onclick="right()"><i class="fa-solid fa-angle-right"></i></button>

    </div>
    <img id="slid" src="" alt="">


    <script src="/swep/swep.js"></script>
</body>

</html>
